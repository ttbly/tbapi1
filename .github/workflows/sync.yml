name: Sync Fork

on:
  workflow_dispatch:

  schedule:
    - cron: '0 */24 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git remote add upstream https://github.com/ls125781003/tbapi1.git || true

          git fetch upstream

          git checkout main

          git merge upstream/main --no-edit

          git push origin main
